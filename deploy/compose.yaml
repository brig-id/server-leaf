# brig·id leaf — production deployment
#
# Uses Docker secrets for BRIGID_MASTER_KEY (never a plaintext env var).
# Caddy handles TLS termination automatically (Let's Encrypt).
#
# Usage:
#   docker secret create brigid_master_key <(echo -n "$BRIGID_MASTER_KEY")
#   docker compose -f deploy/compose.yaml up -d

secrets:
  brigid_master_key:
    external: true

volumes:
  leaf-data:
    driver: local
  caddy-data:
  caddy-config:

networks:
  internal:
    driver: bridge

services:
  # --------------------------------------------------------------------------
  # brig·id leaf application server
  # --------------------------------------------------------------------------
  leaf:
    image: brigid/leaf:latest
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    volumes:
      - leaf-data:/data
    secrets:
      - brigid_master_key
    environment:
      RUST_LOG: "brigid_api=info,leaf=info,warn"
      BRIGID_MASTER_KEY_FILE: /run/secrets/brigid_master_key
      LEAF_SERVER__DOMAIN: "${BRIGID_DOMAIN:?BRIGID_DOMAIN must be set}"
      LEAF_SERVER__PUBLIC_URL: "https://${BRIGID_DOMAIN:?BRIGID_DOMAIN must be set}"
      LEAF_SERVER__HOST: "0.0.0.0"
      LEAF_SERVER__PORT: "8080"
      LEAF_DATABASE__PATH: "/data/brigid.db"
      LEAF_SECURITY__CORS_ORIGINS: '["https://${BRIGID_DOMAIN}"]'
    networks:
      - internal
    expose:
      - "8080"
    healthcheck:
      # The distroless image has no shell or curl.
      # Disable here and rely on Caddy's upstream health-check instead.
      # A native --health-check flag can be added to the leaf binary in a
      # future phase to enable a proper in-process check.
      disable: true

  # --------------------------------------------------------------------------
  # Caddy reverse proxy — automatic TLS via Let's Encrypt
  # --------------------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - internal
    depends_on:
      leaf:
        condition: service_healthy
