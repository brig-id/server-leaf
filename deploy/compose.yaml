# brig·id leaf — production deployment
#
# Uses Docker secrets for BRIGID_MASTER_KEY (never a plaintext env var).
# Caddy handles TLS termination automatically (Let's Encrypt).
#
# Usage:
#   docker secret create brigid_master_key <(echo -n "$BRIGID_MASTER_KEY")
#   docker compose -f deploy/compose.yaml up -d

secrets:
  brigid_master_key:
    external: true

volumes:
  leaf-data:
    driver: local
  caddy-data:
  caddy-config:

networks:
  internal:
    driver: bridge

services:
  # --------------------------------------------------------------------------
  # brig·id leaf application server
  # --------------------------------------------------------------------------
  leaf:
    # Pin to an immutable image digest in production. Floating tags
    # (`brigid/leaf:latest`) can move under your feet during `docker compose
    # pull`, silently introducing an upgrade or downgrade. `${LEAF_IMAGE:?...}`
    # forces operators to set the variable explicitly to a pinned reference,
    # e.g.
    #   LEAF_IMAGE=brigid/leaf:vX.Y.Z@sha256:<64-hex>
    # Docker Compose refuses to start the stack when the variable is unset,
    # so a stale or floating `:latest` can never be deployed by accident.
    image: ${LEAF_IMAGE:?set LEAF_IMAGE to a pinned image digest (e.g. brigid/leaf:vX.Y.Z@sha256:<64-hex>)}
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    volumes:
      - leaf-data:/data
    secrets:
      - brigid_master_key
    environment:
      RUST_LOG: "brigid_api=info,leaf=info,warn"
      BRIGID_MASTER_KEY_FILE: /run/secrets/brigid_master_key
      LEAF_SERVER__DOMAIN: "${BRIGID_DOMAIN:?BRIGID_DOMAIN must be set}"
      LEAF_SERVER__PUBLIC_URL: "https://${BRIGID_DOMAIN:?BRIGID_DOMAIN must be set}"
      LEAF_SERVER__HOST: "0.0.0.0"
      LEAF_SERVER__PORT: "8080"
      LEAF_DATABASE__PATH: "/data/brigid.db"
      # Double-quoted for consistency with the other interpolated values in
      # this block and to make the `${BRIGID_DOMAIN}` substitution obvious
      # at a glance. Compose still interpolates inside single quotes, but
      # mixing quote styles makes review more error-prone.
      LEAF_SECURITY__CORS_ORIGINS: '["https://${BRIGID_DOMAIN}"]'
    networks:
      - internal
    expose:
      - "8080"
    healthcheck:
      # Healthcheck is intentionally disabled.
      #
      # The leaf container runs on a distroless image with no shell, no
      # curl/wget, and no busybox — a Docker `HEALTHCHECK` CMD has nothing
      # to invoke. Embedding an in-process probe binary (e.g. grpc_health_probe
      # or a tiny Rust shim) is tracked as a future phase.
      #
      # Until then, liveness is observed externally:
      #   • Caddy (this compose file) reverse-proxies `/` to leaf; a failing
      #     leaf surfaces immediately to clients as 502/504.
      #   • Operators running this stack behind a load balancer / orchestrator
      #     (Kubernetes, Nomad, ECS, …) should configure an L7 probe targeting
      #     `https://${BRIGID_DOMAIN}/health` from the proxy layer, or an L4
      #     TCP probe on `8080` inside the `internal` network.
      disable: true

  # --------------------------------------------------------------------------
  # Caddy reverse proxy — automatic TLS via Let's Encrypt
  # --------------------------------------------------------------------------
  caddy:
    # Pinned to an immutable digest (caddy:2-alpine at the time of writing)
    # so production deployments don't roll forward to a new Caddy minor
    # whenever the upstream tag is republished. Refresh together with the
    # human-readable tag when upgrading Caddy.
    image: caddy:2-alpine@sha256:3739ea4f0c877259a693d932693cf8f3408e9a9497c004f031b0e830e93e1546
    restart: unless-stopped
    environment:
      # Caddy's `{$BRIGID_DOMAIN}` substitution reads from this container's
      # environment — the variable must be propagated explicitly from the host.
      BRIGID_DOMAIN: "${BRIGID_DOMAIN:?BRIGID_DOMAIN must be set}"
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - internal
    depends_on:
      leaf:
        condition: service_started
